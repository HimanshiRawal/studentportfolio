<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0d14;--bg2:#13131e;--bg3:#1a1a28;--card:#1e1e2e;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
    --text:#f0eff8;--muted:#8b8a9e;
    --accent:#7c6af7;--accent2:#5dd6b0;--accent3:#f7a16a;
    --red:#f06a7c;--gold:#f5c842;--r:12px;--r2:20px;
  }
  .light{--bg:#f5f4ff;--bg2:#eceaf9;--bg3:#f0eeff;--card:#fff;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);--text:#1a1a2e;--muted:#6b6a80;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;line-height:1.7;font-size:15px;transition:background .4s,color .4s;}

  /* NAV */
  nav{position:fixed;top:0;left:0;right:0;z-index:999;background:rgba(13,13,20,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;transition:background .4s;}
  .light nav{background:rgba(245,244,255,.9);}
  .nav-logo{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .nav-links{display:flex;gap:.2rem;list-style:none;align-items:center;}
  .nav-links a{text-decoration:none;color:var(--muted);font-size:13px;font-weight:500;padding:6px 12px;border-radius:8px;transition:all .2s;}
  .nav-links a:hover{color:var(--text);background:var(--bg3);}
  .nav-right{display:flex;align-items:center;gap:12px;}
  .dark-toggle{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:50px;padding:6px 14px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .2s;}
  .dark-toggle:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
  .hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;}
  .hamburger span{display:block;width:22px;height:2px;background:var(--text);margin:5px 0;border-radius:2px;transition:all .3s;}
  .mobile-menu{display:none;position:fixed;top:60px;left:0;right:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:1rem;z-index:998;}
  .mobile-menu.open{display:block;}
  .mobile-menu a{display:block;padding:10px 16px;color:var(--text);text-decoration:none;border-radius:8px;}
  .mobile-menu a:hover{background:var(--bg3);}

  /* HERO */
  #hero{min-height:100vh;display:flex;align-items:center;padding:80px 2rem 4rem;position:relative;overflow:hidden;}
  .hero-bg-orb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(80px);opacity:.15;}
  .orb1{width:500px;height:500px;background:var(--accent);top:-100px;right:-100px;}
  .orb2{width:350px;height:350px;background:var(--accent2);bottom:0;left:-80px;}
  .hero-inner{max-width:1100px;margin:0 auto;width:100%;display:grid;grid-template-columns:1fr 380px;gap:4rem;align-items:center;}
  .hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(124,106,247,.12);border:1px solid rgba(124,106,247,.25);border-radius:50px;padding:6px 16px;font-size:12px;font-weight:500;color:#a89ef9;margin-bottom:1.5rem;letter-spacing:.5px;}
  .badge-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
  h1.hero-name{font-family:'DM Serif Display',serif;font-size:clamp(2.8rem,6vw,4.8rem);line-height:1.1;font-weight:400;margin-bottom:1rem;letter-spacing:-1px;}
  h1.hero-name span{color:var(--accent);}
  .hero-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem;}
  .meta-pill{background:var(--bg3);border:1px solid var(--border2);border-radius:50px;padding:5px 14px;font-size:13px;color:var(--muted);}
  .meta-pill strong{color:var(--text);}
  .hero-intro{font-size:1rem;color:var(--muted);max-width:520px;margin-bottom:2rem;line-height:1.8;}
  .hero-intro em{color:var(--accent2);font-style:normal;font-weight:600;}
  .hero-ctas{display:flex;gap:12px;flex-wrap:wrap;}
  .btn-primary{background:var(--accent);color:#fff;border:none;border-radius:50px;padding:12px 28px;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s;display:inline-block;}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,106,247,.4);}
  .btn-outline{background:transparent;color:var(--text);border:1px solid var(--border2);border-radius:50px;padding:12px 28px;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block;transition:all .2s;}
  .btn-outline:hover{background:var(--bg3);border-color:var(--accent);color:var(--accent);}
  .hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:var(--r);overflow:hidden;margin-top:2.5rem;border:1px solid var(--border);}
  .stat-box{background:var(--bg2);padding:1rem;text-align:center;}
  .stat-num{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;}
  .stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .hero-photo-wrap{display:flex;flex-direction:column;align-items:center;gap:1rem;}
  .photo-frame{width:min(280px,100%);aspect-ratio:7/8;border-radius:var(--r2);background:linear-gradient(135deg,var(--bg3),var(--card));border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:transform .35s,border-color .35s,box-shadow .35s;cursor:pointer;}
  .photo-frame:hover{transform:translateY(-4px) scale(1.02);border-color:rgba(124,106,247,.4);box-shadow:0 24px 60px rgba(0,0,0,.16);}
  .photo-frame::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,106,247,.1),rgba(93,214,176,.1));}
  .photo-frame img{width:100%;height:100%;object-fit:cover;border-radius:inherit;position:relative;z-index:1;transition:transform .35s;}
  .photo-frame:hover img{transform:scale(1.05);}
  .photo-initials{font-family:'DM Serif Display',serif;font-size:5rem;color:var(--accent);opacity:.6;position:relative;z-index:1;}
  .photo-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
  .photo-tag{background:var(--bg3);border:1px solid var(--border);border-radius:50px;padding:4px 12px;font-size:12px;color:var(--muted);}

  /* SECTION COMMON */
  section{padding:5rem 2rem;}
  .container{max-width:1100px;margin:0 auto;}
  .section-eyebrow{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:.5rem;}
  h2.section-title{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:400;line-height:1.2;margin-bottom:1rem;}
  .section-sub{color:var(--muted);max-width:540px;font-size:15px;}
  .section-head{margin-bottom:3rem;}
  .divider{height:1px;background:var(--border);}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:1.5rem;transition:border-color .2s,transform .2s;}
  .card:hover{border-color:var(--border2);transform:translateY(-3px);}

  /* ABOUT */
  #about{background:var(--bg2);}
  .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start;}
  .about-fields{display:flex;flex-direction:column;gap:12px;}
  .field-row{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--border);}
  .field-icon{font-size:1.2rem;width:28px;text-align:center;}
  .field-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .field-val{font-size:14px;font-weight:600;}
  .about-desc{color:var(--muted);font-size:15px;line-height:1.8;margin-bottom:1.5rem;}
  .interests-grid{display:flex;flex-wrap:wrap;gap:8px;}
  .interest-chip{background:rgba(124,106,247,.1);border:1px solid rgba(124,106,247,.2);color:#a89ef9;border-radius:50px;padding:5px 14px;font-size:13px;font-weight:500;transition:all .2s;cursor:default;}
  .interest-chip:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

  /* ACADEMICS */
  .subjects-table{width:100%;border-collapse:collapse;}
  .subjects-table th{text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:10px 16px;border-bottom:1px solid var(--border);}
  .subjects-table td{padding:14px 16px;border-bottom:1px solid var(--border);font-size:14px;}
  .subjects-table tr:last-child td{border-bottom:none;}
  .grade-badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:700;}
  .g-aplus{background:rgba(93,214,176,.15);color:var(--accent2);}
  .g-a{background:rgba(124,106,247,.15);color:var(--accent);}
  .g-bplus{background:rgba(247,161,106,.15);color:var(--accent3);}
  .grade-bar-wrap{background:var(--bg3);border-radius:50px;height:6px;width:100%;margin-top:6px;overflow:hidden;}
  .grade-bar{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1s cubic-bezier(.4,0,.2,1);}
  .overall-banner{margin-top:1.5rem;background:linear-gradient(135deg,rgba(124,106,247,.1),rgba(93,214,176,.1));border:1px solid rgba(124,106,247,.2);border-radius:var(--r);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;}
  .overall-pct{font-size:2rem;font-weight:700;color:var(--accent2);}

  /* CLUBS */
  #clubs{background:var(--bg2);}
  .clubs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;}
  .club-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:1.5rem;transition:all .25s;cursor:default;}
  .club-card:hover{border-color:var(--accent);transform:translateY(-4px);}
  .club-icon{font-size:2rem;margin-bottom:.75rem;}
  .club-name{font-weight:700;font-size:15px;margin-bottom:.25rem;}
  .club-years{font-size:12px;color:var(--muted);margin-bottom:.75rem;}
  .club-bullets{list-style:none;}
  .club-bullets li{font-size:12px;color:var(--muted);padding:2px 0 2px 14px;position:relative;}
  .club-bullets li::before{content:'→';position:absolute;left:0;color:var(--accent2);font-size:10px;top:4px;}

  /* COMPETITIONS */
  .timeline{position:relative;padding-left:2rem;}
  .timeline::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--accent),var(--accent2),transparent);}
  .tl-item{position:relative;margin-bottom:1.5rem;}
  .tl-dot{position:absolute;left:-2rem;top:4px;width:16px;height:16px;border-radius:50%;border:2px solid var(--accent);background:var(--bg);display:flex;align-items:center;justify-content:center;}
  .tl-dot-inner{width:6px;height:6px;border-radius:50%;background:var(--accent);}
  .tl-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;transition:all .2s;}
  .tl-card:hover{border-color:var(--border2);}
  .tl-comp{font-weight:600;font-size:14px;margin-bottom:2px;}
  .tl-year{font-size:12px;color:var(--muted);}
  .medal{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:50px;font-size:12px;font-weight:700;white-space:nowrap;}
  .gold{background:rgba(245,200,66,.15);color:var(--gold);border:1px solid rgba(245,200,66,.3);}
  .silver{background:rgba(180,180,200,.15);color:#b4b4c8;border:1px solid rgba(180,180,200,.3);}
  .bronze{background:rgba(200,140,80,.15);color:#c87840;border:1px solid rgba(200,140,80,.3);}
  .finalist{background:rgba(93,214,176,.1);color:var(--accent2);border:1px solid rgba(93,214,176,.25);}
  .participation{background:rgba(180,180,200,.08);color:var(--muted);border:1px solid var(--border);}

  /* PROJECTS */
  .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem;}
  .project-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:all .25s;cursor:default;}
  .project-card:hover{border-color:var(--accent);transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,.3);}
  .project-thumb{height:160px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;}
  .project-body{padding:1.25rem;}
  .project-type{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:.5rem;}
  .project-name{font-size:1rem;font-weight:700;margin-bottom:.5rem;}
  .project-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:.75rem;}
  .project-tags{display:flex;flex-wrap:wrap;gap:6px;}
  .project-tag{font-size:11px;background:var(--bg3);color:var(--muted);padding:3px 9px;border-radius:50px;}
  .award-banner{font-size:11px;background:rgba(245,200,66,.1);color:var(--gold);padding:5px 12px;margin:.75rem -1.25rem -1.25rem;border-top:1px solid rgba(245,200,66,.2);text-align:center;font-weight:600;}

  /* CERTIFICATES */
  #certs{background:var(--bg2);}
  .certs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;}
  .cert-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem;text-align:center;cursor:pointer;transition:all .25s;}
  .cert-card:hover{border-color:var(--gold);transform:scale(1.03);}
  .cert-icon{font-size:2.5rem;margin-bottom:.75rem;}
  .cert-name{font-size:13px;font-weight:600;margin-bottom:4px;}
  .cert-issuer{font-size:11px;color:var(--muted);}

  /* SKILLS */
  .skills-outer{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;}
  .skill-group-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;}
  .skill-item{margin-bottom:1rem;}
  .skill-top{display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px;}
  .skill-name{font-weight:500;}
  .skill-pct{color:var(--muted);font-size:12px;}
  .skill-track{background:var(--bg3);border-radius:50px;height:5px;overflow:hidden;}
  .skill-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:width 1.2s cubic-bezier(.4,0,.2,1);}

  /* BLOG */
  .blog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem;}
  .blog-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:1.5rem;transition:all .25s;cursor:pointer;}
  .blog-card:hover{border-color:var(--accent);transform:translateY(-3px);}
  .blog-tag{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:50px;margin-bottom:.75rem;display:inline-block;}
  .blog-date{font-size:12px;color:var(--muted);margin-bottom:.5rem;}
  .blog-title{font-size:1rem;font-weight:700;line-height:1.4;margin-bottom:.5rem;}
  .blog-excerpt{font-size:13px;color:var(--muted);line-height:1.6;}
  .blog-more{font-size:12px;color:var(--accent);margin-top:.75rem;font-weight:600;}
  .blog-overlay{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:1rem;}
  .blog-overlay.open{display:flex;}
  .blog-modal{background:var(--card);border:1px solid var(--border2);border-radius:var(--r2);max-width:620px;width:100%;max-height:85vh;overflow-y:auto;padding:2rem;position:relative;}
  .modal-close{position:absolute;top:1rem;right:1rem;background:var(--bg3);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:1rem;color:var(--text);display:flex;align-items:center;justify-content:center;}
  .blog-modal h3{font-size:1.4rem;font-weight:700;margin-bottom:1rem;line-height:1.3;}
  .blog-modal p{font-size:14px;color:var(--muted);line-height:1.8;margin-bottom:1rem;}

  /* TESTIMONIALS */
  #testimonials{background:var(--bg2);}
  .testi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;}
  .testi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:1.5rem;position:relative;}
  .testi-quote{font-size:3rem;line-height:.5;color:var(--accent);opacity:.3;position:absolute;top:1rem;left:1.25rem;font-family:Georgia,serif;}
  .testi-text{font-size:14px;color:var(--muted);line-height:1.8;padding-top:1.5rem;margin-bottom:1rem;font-style:italic;}
  .testi-author{display:flex;align-items:center;gap:10px;}
  .testi-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
  .testi-name{font-weight:700;font-size:13px;}
  .testi-role{font-size:11px;color:var(--muted);}
  .stars{color:var(--gold);font-size:12px;margin-bottom:.5rem;}

  /* CONTACT */
  .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;}
  .contact-info{display:flex;flex-direction:column;gap:1rem;}
  .contact-row{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);}
  .contact-icon{width:40px;height:40px;border-radius:var(--r);background:rgba(124,106,247,.15);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
  .contact-lbl{font-size:11px;color:var(--muted);}
  .contact-val{font-size:14px;font-weight:600;}
  .social-row{display:flex;gap:10px;margin-top:.5rem;}
  .social-btn{width:42px;height:42px;border-radius:var(--r);background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.2rem;text-decoration:none;cursor:pointer;transition:all .2s;}
  .social-btn:hover{background:var(--accent);border-color:var(--accent);transform:translateY(-2px);}
  .form-group{margin-bottom:1rem;}
  .form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
  .form-group input,.form-group textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;color:var(--text);font-family:inherit;font-size:14px;outline:none;resize:none;transition:border-color .2s;}
  .form-group input:focus,.form-group textarea:focus{border-color:var(--accent);}
  .form-success{display:none;background:rgba(93,214,176,.1);border:1px solid rgba(93,214,176,.3);color:var(--accent2);border-radius:var(--r);padding:12px 16px;font-size:14px;text-align:center;margin-top:.5rem;}

  footer{background:var(--bg2);border-top:1px solid var(--border);padding:2rem;text-align:center;}
  footer p{color:var(--muted);font-size:13px;}
  footer a{color:var(--accent);text-decoration:none;}

  .fade-up{opacity:0;transform:translateY(28px);transition:opacity .6s ease,transform .6s ease;}
  .fade-up.visible{opacity:1;transform:translateY(0);}

  @media(max-width:900px){
    .hero-inner{grid-template-columns:1fr;}
    .hero-photo-wrap{order:-1;}
    .about-grid,.contact-grid{grid-template-columns:1fr;}
    nav .nav-links{display:none;}
    .hamburger{display:block;}
  }
  @media(max-width:600px){
    section{padding:3.5rem 1.25rem;}
    nav{padding:0 1.25rem;}
    #hero{padding-top:70px;}
    .photo-frame{width:220px;height:260px;}
    .hero-stats{grid-template-columns:1fr 1fr 1fr;}
    .tl-card{flex-direction:column;align-items:flex-start;}
    .projects-grid,.blog-grid{grid-template-columns:1fr;}
  }
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{transition:none!important;animation:none!important;}}
</style>
</head>
<body>

<!-- NAV (shell — filled by JS) -->
<nav>
  <div class="nav-logo" id="navLogo"></div>
  <ul class="nav-links" id="navLinks"></ul>
  <div class="nav-right">
    <button class="dark-toggle" id="themeBtn" onclick="toggleTheme()">☀ Light</button>
    <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu"></div>

<!-- HERO -->
<section id="hero">
  <div class="hero-bg-orb orb1"></div>
  <div class="hero-bg-orb orb2"></div>
  <div class="hero-inner container" id="heroInner"></div>
</section>
<div class="divider"></div>

<!-- ABOUT -->
<section id="about"><div class="container" id="aboutContainer"></div></section>
<div class="divider"></div>

<!-- ACADEMICS -->
<section id="academics"><div class="container" id="academicsContainer"></div></section>
<div class="divider"></div>

<!-- CLUBS -->
<section id="clubs"><div class="container" id="clubsContainer"></div></section>
<div class="divider"></div>

<!-- COMPETITIONS -->
<section id="competitions"><div class="container" id="competitionsContainer"></div></section>
<div class="divider"></div>

<!-- PROJECTS -->
<section id="projects"><div class="container" id="projectsContainer"></div></section>
<div class="divider"></div>

<!-- CERTS -->
<section id="certs"><div class="container" id="certsContainer"></div></section>
<div class="divider"></div>

<!-- SKILLS -->
<section id="skills"><div class="container" id="skillsContainer"></div></section>
<div class="divider"></div>

<!-- BLOG -->
<section id="blog"><div class="container" id="blogContainer"></div></section>
<div class="blog-overlay" id="blogOverlay" onclick="closeBlog(event)">
  <div class="blog-modal">
    <button class="modal-close" onclick="closeBlogForce()">✕</button>
    <div id="blogContent"></div>
  </div>
</div>
<div class="divider"></div>

<!-- TESTIMONIALS -->
<section id="testimonials"><div class="container" id="testimonialsContainer"></div></section>
<div class="divider"></div>

<!-- CONTACT -->
<section id="contact"><div class="container" id="contactContainer"></div></section>

<!-- FOOTER -->
<footer id="siteFooter"></footer>

<script>
// ─── THEME ───────────────────────────────────────────────────────────────────
let isDark = true;
function toggleTheme(){
  isDark=!isDark;
  document.body.classList.toggle('light',!isDark);
  document.getElementById('themeBtn').textContent=isDark?'☀ Light':'🌙 Dark';
}
function toggleMenu(){document.getElementById('mobileMenu').classList.toggle('open');}
function closeMenu(){document.getElementById('mobileMenu').classList.remove('open');}

// ─── INTERSECTION / ANIMATION ────────────────────────────────────────────────
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add('visible');
      e.target.querySelectorAll('.grade-bar[data-w]').forEach(b=>b.style.width=b.dataset.w+'%');
      e.target.querySelectorAll('.skill-fill[data-w]').forEach(b=>b.style.width=b.dataset.w+'%');
      e.target.querySelectorAll('.stat-num[data-count]').forEach(el=>animateCount(el,parseInt(el.dataset.count),1200));
    }
  });
},{threshold:0.1});

function observeAll(){document.querySelectorAll('.fade-up').forEach(el=>observer.observe(el));}

function animateCount(el,target,duration){
  let s=0;const step=(target/duration)*16;
  const t=setInterval(()=>{s+=step;if(s>=target){s=target;clearInterval(t);}el.textContent=Math.floor(s)+(el.dataset.suffix||'');},16);
}

// ─── BLOG MODAL ───────────────────────────────────────────────────────────────
let _blogPosts=[];
function openBlog(idx){
  const p=_blogPosts[idx];
  document.getElementById('blogContent').innerHTML=`
    <span style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:${p.tagColor};background:${p.tagBg};padding:3px 10px;border-radius:50px;display:inline-block;margin-bottom:.75rem">${p.tag}</span>
    <p style="font-size:12px;color:var(--muted);margin-bottom:.5rem">${p.date}</p>
    <h3>${p.title}</h3>${p.content}`;
  document.getElementById('blogOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeBlog(e){if(e.target===document.getElementById('blogOverlay'))closeBlogForce();}
function closeBlogForce(){document.getElementById('blogOverlay').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeBlogForce();});

// ─── CONTACT FORM ─────────────────────────────────────────────────────────────
function sendMsg(){
  const n=document.getElementById('cName').value.trim();
  const em=document.getElementById('cEmail').value.trim();
  if(!n||!em){alert('Please fill in your name and email.');return;}
  document.getElementById('formSuccess').style.display='block';
  ['cName','cEmail','cSubject','cMsg'].forEach(id=>document.getElementById(id).value='');
  setTimeout(()=>document.getElementById('formSuccess').style.display='none',5000);
}

// ─── DOWNLOAD RESUME ──────────────────────────────────────────────────────────
function downloadResume(d){
  const h=d.hero;const ab=d.about;const ac=d.academics;const cl=d.clubs;const co=d.competitions;const pr=d.projects;const sk=d.skills;const c=d.contact;const f=d.footer;
  const lines=[
    `${h.name} ${h.surname}`,
    `${h.grade} | ${h.school} | ${h.city}`,
    `Email: ${c.email}`,``,
    `CAREER GOAL`,ab.fields.find(x=>x.label==='Career Goal')?.value||'',``,
    `ACADEMIC PERFORMANCE`,
    ...ac.subjects.map(s=>`${s.name}: ${s.grade} (${s.score}%)`),
    `Overall: ${ac.overallPct} — ${ac.overallTag}`,``,
    `GEMMA CLUB PARTICIPATION`,
    ...cl.list.map(x=>`- ${x.name} (${x.years})`),``,
    `KEY ACHIEVEMENTS`,
    ...co.list.map(x=>`- ${x.medal} — ${x.name} ${x.year}`),``,
    `PROJECTS`,
    ...pr.list.map((x,i)=>`${i+1}. ${x.name}`),``,
    `SKILLS`,
    ...sk.groups.map(g=>`${g.title}: ${g.items.map(i=>i.name).join(', ')}`),``,
    `LANGUAGES: ${ab.fields.find(x=>x.label==='Languages')?.value||''}`
  ];
  const blob=new Blob([lines.join('\n')],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`${h.name}_${h.surname}_Resume.txt`;a.click();
}

// ─── RENDER HELPERS ───────────────────────────────────────────────────────────
const sectionHead=(ey,ti,sub)=>`
  <div class="section-head fade-up">
    <div class="section-eyebrow">${ey}</div>
    <h2 class="section-title">${ti}</h2>
    ${sub?`<p class="section-sub">${sub}</p>`:''}
  </div>`;

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
async function init(){
  let d;
  try{
    const res=await fetch('data.json');
    if(!res.ok)throw new Error('not found');
    d=await res.json();
  }catch(err){
    document.body.innerHTML='<p style="padding:4rem;text-align:center;color:#f06a7c">⚠ Could not load data.json. Make sure it is in the same folder as index.html.</p>';
    return;
  }

  document.title=d.meta.pageTitle;
  _blogPosts=d.blog.posts;

  // ── NAV ──────────────────────────────────────────────────────────────────
  const initials=d.hero.name[0]+(d.hero.surname[0]||'');
  document.getElementById('navLogo').textContent=initials;
  const navSections=[
    {href:'#about',label:'About'},
    {href:'#academics',label:'Academics'},
    {href:'#clubs',label:'Clubs'},
    {href:'#competitions',label:'Achievements'},
    {href:'#projects',label:'Projects'},
    {href:'#blog',label:'Blog'},
    {href:'#contact',label:'Contact'},
  ];
  document.getElementById('navLinks').innerHTML=navSections.map(n=>`<li><a href="${n.href}">${n.label}</a></li>`).join('');
  document.getElementById('mobileMenu').innerHTML=navSections.map(n=>`<a href="${n.href}" onclick="closeMenu()">${n.label}</a>`).join('');

  // ── HERO ─────────────────────────────────────────────────────────────────
  const h=d.hero;
  document.getElementById('heroInner').innerHTML=`
    <div>
      <div class="hero-badge"><span class="badge-dot"></span> ${d.meta.badge}</div>
      <h1 class="hero-name">${h.name}<br><span>${h.surname}</span></h1>
      <div class="hero-meta">
        <span class="meta-pill">📚 <strong>${h.grade}</strong></span>
        <span class="meta-pill">🏫 <strong>${h.school}</strong></span>
        <span class="meta-pill">📍 ${h.city}</span>
      </div>
      <p class="hero-intro">${h.introduction}</p>
      <div class="hero-ctas">
        <a href="#about" class="btn-primary">Explore Portfolio</a>
        <a href="javascript:void(0)" onclick="downloadResume(window.__DATA__)" class="btn-outline">⬇ Download Resume</a>
      </div>
      <div class="hero-stats">
        ${h.stats.map(s=>`<div class="stat-box"><span class="stat-num" data-count="${s.count}">0</span><span class="stat-lbl">${s.label}</span></div>`).join('')}
      </div>
    </div>
    <div class="hero-photo-wrap">
      <div class="photo-frame">
        <img src="${h.photo}" alt="${h.photoAlt}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <div class="photo-initials" style="display:none">${initials}</div>
      </div>
      <div class="photo-tags">${h.photoTags.map(t=>`<span class="photo-tag">${t}</span>`).join('')}</div>
    </div>`;

  // ── ABOUT ────────────────────────────────────────────────────────────────
  const ab=d.about;
  document.getElementById('aboutContainer').innerHTML=`
    ${sectionHead(ab.eyebrow,ab.title,ab.subtitle)}
    <div class="about-grid">
      <div class="fade-up">
        ${ab.paragraphs.map(p=>`<p class="about-desc">${p}</p>`).join('')}
        <div style="margin-top:1.5rem">
          <p style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;font-weight:700">Interests &amp; Hobbies</p>
          <div class="interests-grid">${ab.interests.map(i=>`<span class="interest-chip">${i}</span>`).join('')}</div>
        </div>
      </div>
      <div class="about-fields fade-up">
        ${ab.fields.map(f=>`
          <div class="field-row">
            <span class="field-icon">${f.icon}</span>
            <div><div class="field-label">${f.label}</div><div class="field-val">${f.value}</div></div>
          </div>`).join('')}
      </div>
    </div>`;

  // ── ACADEMICS ────────────────────────────────────────────────────────────
  const ac=d.academics;
  const scoreColor=s=>s>=95?'var(--accent2)':s>=90?'var(--accent)':'var(--accent3)';
  document.getElementById('academicsContainer').innerHTML=`
    ${sectionHead(ac.eyebrow,ac.title,ac.subtitle)}
    <div class="fade-up card" style="padding:0;overflow:hidden">
      <table class="subjects-table">
        <thead><tr><th>Subject</th><th>Grade</th><th style="min-width:160px">Progress</th><th>Score</th></tr></thead>
        <tbody>
          ${ac.subjects.map(s=>`<tr>
            <td>${s.emoji} ${s.name}</td>
            <td><span class="grade-badge ${s.gradeClass}">${s.grade}</span></td>
            <td><div class="grade-bar-wrap"><div class="grade-bar" data-w="${s.score}"></div></div></td>
            <td style="color:${scoreColor(s.score)};font-weight:700">${s.score}%</td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div class="overall-banner">
        <div>
          <p style="font-size:13px;color:var(--muted)">${ac.year}</p>
          <p style="font-weight:700">${ac.overallLabel} — <span style="color:var(--accent2)">${ac.overallTag}</span></p>
        </div>
        <div style="text-align:right">
          <p style="font-size:12px;color:var(--muted)">Overall Percentage</p>
          <p class="overall-pct">${ac.overallPct}</p>
        </div>
      </div>
    </div>`;

  // ── CLUBS ────────────────────────────────────────────────────────────────
  const cl=d.clubs;
  document.getElementById('clubsContainer').innerHTML=`
    ${sectionHead(cl.eyebrow,cl.title,cl.subtitle)}
    <div class="clubs-grid">
      ${cl.list.map(c=>`
        <div class="club-card fade-up">
          <div class="club-icon">${c.icon}</div>
          <div class="club-name">${c.name}</div>
          <div class="club-years">${c.years}</div>
          <ul class="club-bullets">${c.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>
        </div>`).join('')}
    </div>`;

  // ── COMPETITIONS ─────────────────────────────────────────────────────────
  const co=d.competitions;
  document.getElementById('competitionsContainer').innerHTML=`
    ${sectionHead(co.eyebrow,co.title,co.subtitle)}
    <div class="timeline fade-up">
      ${co.list.map(item=>`
        <div class="tl-item">
          <div class="tl-dot"><div class="tl-dot-inner"></div></div>
          <div class="tl-card">
            <div>
              <div class="tl-comp">${item.name}</div>
              <div class="tl-year">${item.year}</div>
            </div>
            <span class="medal ${item.medalClass}">${item.medal}</span>
          </div>
        </div>`).join('')}
    </div>`;

  // ── PROJECTS ─────────────────────────────────────────────────────────────
  const pr=d.projects;
  document.getElementById('projectsContainer').innerHTML=`
    ${sectionHead(pr.eyebrow,pr.title,pr.subtitle)}
    <div class="projects-grid">
      ${pr.list.map(p=>`
        <div class="project-card fade-up">
          <div class="project-thumb" style="background:${p.thumbBg}">${p.thumbEmoji}</div>
          <div class="project-body">
            <div class="project-type">${p.type}</div>
            <div class="project-name">${p.name}</div>
            <div class="project-desc">${p.desc}</div>
            <div class="project-tags">${p.tags.map(t=>`<span class="project-tag">${t}</span>`).join('')}</div>
            ${p.award?`<div class="award-banner">${p.award}</div>`:''}
          </div>
        </div>`).join('')}
    </div>`;

  // ── CERTIFICATES ─────────────────────────────────────────────────────────
  const ce=d.certificates;
  document.getElementById('certsContainer').innerHTML=`
    ${sectionHead(ce.eyebrow,ce.title,ce.subtitle)}
    <div class="certs-grid">
      ${ce.list.map(c=>`
        <div class="cert-card fade-up">
          <div class="cert-icon">${c.icon}</div>
          <div class="cert-name">${c.name}</div>
          <div class="cert-issuer">${c.issuer}</div>
        </div>`).join('')}
    </div>`;

  // ── SKILLS ───────────────────────────────────────────────────────────────
  const sk=d.skills;
  document.getElementById('skillsContainer').innerHTML=`
    ${sectionHead(sk.eyebrow,sk.title,sk.subtitle)}
    <div class="skills-outer">
      ${sk.groups.map(g=>`
        <div class="card fade-up">
          <p class="skill-group-title">${g.title}</p>
          ${g.items.map(i=>`
            <div class="skill-item">
              <div class="skill-top"><span class="skill-name">${i.name}</span><span class="skill-pct">${i.pct}%</span></div>
              <div class="skill-track"><div class="skill-fill" data-w="${i.pct}"></div></div>
            </div>`).join('')}
        </div>`).join('')}
    </div>`;

  // ── BLOG ─────────────────────────────────────────────────────────────────
  const bl=d.blog;
  document.getElementById('blogContainer').innerHTML=`
    ${sectionHead(bl.eyebrow,bl.title,bl.subtitle)}
    <div class="blog-grid">
      ${bl.posts.map((p,i)=>`
        <div class="blog-card fade-up" onclick="openBlog(${i})">
          <span class="blog-tag" style="background:${p.tagBg};color:${p.tagColor}">${p.tag}</span>
          <div class="blog-date">${p.date}</div>
          <div class="blog-title">${p.title}</div>
          <div class="blog-excerpt">${p.excerpt}</div>
          <div class="blog-more">Read full article →</div>
        </div>`).join('')}
    </div>`;

  // ── TESTIMONIALS ─────────────────────────────────────────────────────────
  const te=d.testimonials;
  document.getElementById('testimonialsContainer').innerHTML=`
    ${sectionHead(te.eyebrow,te.title,'')}
    <div class="testi-grid">
      ${te.list.map(t=>`
        <div class="testi-card fade-up">
          <div class="testi-quote">"</div>
          <div class="stars">★★★★★</div>
          <div class="testi-text">${t.text}</div>
          <div class="testi-author">
            <div class="testi-avatar" style="background:${t.avatarBg};color:${t.avatarColor}">${t.initials}</div>
            <div><div class="testi-name">${t.name}</div><div class="testi-role">${t.role}</div></div>
          </div>
        </div>`).join('')}
    </div>`;

  // ── CONTACT ──────────────────────────────────────────────────────────────
  const ct=d.contact;
  document.getElementById('contactContainer').innerHTML=`
    ${sectionHead(ct.eyebrow,ct.title,ct.subtitle)}
    <div class="contact-grid fade-up">
      <div class="contact-info">
        <div class="contact-row"><div class="contact-icon">📧</div><div><div class="contact-lbl">Email</div><div class="contact-val">${ct.email}</div></div></div>
        <div class="contact-row"><div class="contact-icon">🏫</div><div><div class="contact-lbl">School</div><div class="contact-val">${ct.school}</div></div></div>
        <div class="contact-row"><div class="contact-icon">📍</div><div><div class="contact-lbl">Location</div><div class="contact-val">${ct.location}</div></div></div>
        <div>
          <p style="font-size:12px;color:var(--muted);margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Social Media</p>
          <div class="social-row">${ct.socials.map(s=>`<span class="social-btn" title="${s.title}">${s.icon}</span>`).join('')}</div>
        </div>
      </div>
      <div class="card">
        <p style="font-weight:700;margin-bottom:1rem;font-size:15px">Send a Message</p>
        <div class="form-group"><label>Your Name</label><input type="text" placeholder="Full name" id="cName"></div>
        <div class="form-group"><label>Email Address</label><input type="email" placeholder="your@email.com" id="cEmail"></div>
        <div class="form-group"><label>Subject</label><input type="text" placeholder="What's this about?" id="cSubject"></div>
        <div class="form-group"><label>Message</label><textarea rows="4" placeholder="Your message here..." id="cMsg"></textarea></div>
        <button class="btn-primary" onclick="sendMsg()" style="width:100%">Send Message ✉</button>
        <div class="form-success" id="formSuccess">✅ Message sent! I'll get back to you soon.</div>
      </div>
    </div>`;

  // ── FOOTER ───────────────────────────────────────────────────────────────
  const f=d.footer;
  document.getElementById('siteFooter').innerHTML=`
    <p>Made with ❤ by <strong>${f.name}</strong> · ${f.grade} · ${f.school} · <a href="mailto:${f.email}">${f.email}</a></p>
    <p style="margin-top:6px;font-size:12px">${f.club} · ${f.year} · ${f.city}</p>`;

  // ── store data for resume download, then kick off observers ──────────────
  window.__DATA__=d;
  observeAll();
}

init();
</script>
</body>
</html>
