<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEMMA Club — Student Portfolios</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0d14;--bg2:#13131e;--bg3:#1a1a28;--card:#1e1e2e;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#f0eff8;--muted:#8b8a9e;--accent:#7c6af7;--accent2:#5dd6b0;--accent3:#f7a16a;--gold:#f5c842;--r:12px;--r2:20px;}
  .light{--bg:#f5f4ff;--bg2:#eceaf9;--bg3:#f0eeff;--card:#fff;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);--text:#1a1a2e;--muted:#6b6a80;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;line-height:1.7;font-size:15px;transition:background .4s,color .4s;min-height:100vh;}
  nav{position:fixed;top:0;left:0;right:0;z-index:99;background:rgba(13,13,20,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;}
  .light nav{background:rgba(245,244,255,.95);}
  .nav-logo{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .dark-toggle{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:50px;padding:6px 14px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .2s;}
  .dark-toggle:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

  .hero{padding:120px 2rem 4rem;text-align:center;position:relative;overflow:hidden;}
  .orb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(80px);opacity:.12;}
  .o1{width:500px;height:500px;background:var(--accent);top:-150px;right:-100px;}
  .o2{width:400px;height:400px;background:var(--accent2);bottom:-100px;left:-100px;}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:.75rem;}
  h1{font-family:'DM Serif Display',serif;font-size:clamp(2.2rem,5vw,3.8rem);font-weight:400;line-height:1.15;margin-bottom:1rem;}
  .sub{color:var(--muted);max-width:480px;margin:0 auto 2.5rem;font-size:15px;}

  .container{max-width:1100px;margin:0 auto;padding:0 2rem 5rem;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem;}

  .student-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:1.5rem;cursor:pointer;transition:all .25s;text-decoration:none;display:block;color:inherit;}
  .student-card:hover{border-color:var(--accent);transform:translateY(-5px);box-shadow:0 20px 50px rgba(0,0,0,.3);}
  .sc-top{display:flex;align-items:center;gap:1rem;margin-bottom:1rem;}
  .sc-avatar{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--border2);flex-shrink:0;}
  .sc-avatar-placeholder{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:1.4rem;color:#fff;flex-shrink:0;}
  .sc-name{font-weight:700;font-size:1rem;margin-bottom:2px;}
  .sc-meta{font-size:12px;color:var(--muted);}
  .sc-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem;}
  .sc-badge{font-size:11px;background:var(--bg3);border:1px solid var(--border);border-radius:50px;padding:3px 10px;color:var(--muted);}
  .sc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1rem;}
  .sc-stat{background:var(--bg2);padding:.6rem;text-align:center;}
  .sc-stat-num{font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;}
  .sc-stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
  .view-btn{width:100%;background:rgba(124,106,247,.1);border:1px solid rgba(124,106,247,.25);color:var(--accent);border-radius:50px;padding:9px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;text-align:center;}
  .student-card:hover .view-btn{background:var(--accent);color:#fff;border-color:var(--accent);}

  .empty{text-align:center;padding:4rem;color:var(--muted);}

  @media(max-width:600px){.container{padding:0 1.25rem 4rem;}.hero{padding:100px 1.25rem 3rem;}}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">GEMMA Portfolios</div>
  <button class="dark-toggle" id="themeBtn" onclick="toggleTheme()">☀ Light</button>
</nav>

<div class="hero">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="eyebrow">GEMMA Club System</div>
  <h1>Student Portfolio<br>Directory</h1>
  <p class="sub">Select a student to view their full portfolio — all powered by a single JSON data file.</p>
</div>

<div class="container">
  <div class="grid" id="grid">
    <div class="empty">Loading students…</div>
  </div>
</div>

<script>
let isDark=true;
function toggleTheme(){isDark=!isDark;document.body.classList.toggle('light',!isDark);document.getElementById('themeBtn').textContent=isDark?'☀ Light':'🌙 Dark';}

function initials(name){return name.split(' ').map(w=>w[0]).slice(0,2).join('');}

async function init(){
  let data;
  try{
    const r=await fetch('data.json');
    if(!r.ok)throw new Error();
    data=await r.json();
  }catch{
    document.getElementById('grid').innerHTML='<div class="empty">⚠ Could not load data.json</div>';
    return;
  }

  const students=data.students||[];
  if(!students.length){document.getElementById('grid').innerHTML='<div class="empty">No students found in data.json</div>';return;}

  document.getElementById('grid').innerHTML=students.map(s=>{
    const si=s.student_info;
    const st=s.statistical_data;
    const hasPhoto=si.photo&&si.photo.trim()!=='';
    const avatarHtml=hasPhoto
      ?`<img class="sc-avatar" src="${si.photo}" alt="${si.student_name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      :'';
    const placeholderHtml=`<div class="sc-avatar-placeholder" style="${hasPhoto?'display:none':'display:flex'}">${initials(si.student_name)}</div>`;
    return `
    <a class="student-card" href="portfolio.html?id=${s.id}">
      <div class="sc-top">
        ${avatarHtml}${placeholderHtml}
        <div>
          <div class="sc-name">${si.student_name}</div>
          <div class="sc-meta">${si.grade} · ${si.school_name}</div>
          <div class="sc-meta">${si.city}, ${si.country}</div>
        </div>
      </div>
      <div class="sc-badges">
        <span class="sc-badge">📚 ${si.grade}</span>
        <span class="sc-badge">📍 ${si.city}</span>
        <span class="sc-badge">🎯 ${si.participation_category}</span>
      </div>
      <div class="sc-stats">
        <div class="sc-stat"><span class="sc-stat-num">${st.clubs_count}</span><span class="sc-stat-lbl">Clubs</span></div>
        <div class="sc-stat"><span class="sc-stat-num">${st.competitions_count}</span><span class="sc-stat-lbl">Awards</span></div>
        <div class="sc-stat"><span class="sc-stat-num">${st.overall_score}%</span><span class="sc-stat-lbl">Score</span></div>
      </div>
      <div class="view-btn">View Full Portfolio →</div>
    </a>`;}
  ).join('');
}
init();
</script>
</body>
</html>
